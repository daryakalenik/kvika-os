@let id = layoutService.activeWindowId();
@let data = layoutService.getWindowById(id);

@if (id && data) {
  <div class="header">
    <div class="title">
      <span>{{ data.icon }}</span>
      <div>{{ data.title }}</div>
    </div>

    <div class="actions">
      <button (click)="foldWindow()">hide button</button>
      <button (click)="closeWindow()">close button</button>
    </div>
  </div>
  <div>some content</div>
}
