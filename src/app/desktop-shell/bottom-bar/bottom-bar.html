@for (item of layoutService.openWindows(); track item.id) {
  <div>
    @if (item.id === layoutService.activeWindowId()) {
      <span>THIS ONE IS ACTIVE WINDOW</span>
    }

    <span>{{ item.icon }}</span>
    <button (click)="toggleWindow(item)">{{ item.title }}</button>

    <button (click)="closeWindow(item.id)">close</button>
  </div>
}
